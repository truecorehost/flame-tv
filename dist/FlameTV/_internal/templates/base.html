<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flame TV</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: system-ui, sans-serif; font-size: 15px; }
  a { color: #f60; text-decoration: none; }
  a:hover { text-decoration: underline; }
  nav { background: #1a1a1a; padding: 12px 20px; display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #f60; }
  nav strong { color: #f60; font-size: 18px; }
  nav form { display: flex; gap: 8px; margin-left: auto; }
  nav input { background: #333; border: 1px solid #444; color: #eee; padding: 6px 10px; border-radius: 4px; width: 220px; }
  nav button { background: #f60; border: none; color: #fff; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  h1 { margin-bottom: 20px; font-size: 22px; }
  h2 { margin-bottom: 12px; font-size: 18px; color: #ccc; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
  .badge-have  { background: #1a4a1a; color: #4c4; }
  .badge-want  { background: #4a1a1a; color: #f44; }
  .badge-dl    { background: #2a3a1a; color: #af4; }
  .badge-skip  { background: #333; color: #888; }
  .btn { display: inline-block; padding: 6px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; }
  .btn-grab  { background: #f60; color: #fff; }
  .btn-plain { background: #333; color: #ccc; }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<nav>
  <strong>🔥 Flame TV</strong>
  <a href="/">Library</a>
  <a href="/scan/dry">Dry Run Scan</a>
  <a href="/settings">Settings</a>
  <a href="/stats">Stats</a>
  <a href="/logs">Logs</a>
  <form method="post" action="/scan/run" style="display:inline" onsubmit="return confirm('This will rename and move all files in D:\\Media\\TV. Sure?')">
    <button class="btn btn-grab" type="submit">🔧 Scan & Organise</button>
  </form>
  <form action="/search" method="get">
    <input name="q" placeholder="Add show..." autocomplete="off">
    <button type="submit">Search</button>
  </form>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
